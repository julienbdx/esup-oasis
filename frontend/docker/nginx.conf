server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Servir les fichiers pré-compressés au build (zéro CPU à runtime)
  gzip_static on;
  gzip_vary on;

  # Security headers
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ${REACT_APP_API} ${REACT_APP_OAUTH_PROVIDER}; frame-ancestors 'none'; object-src 'none';" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Cache pour les assets statiques avec hash (chunked files)
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Cache pour les images
  location ~* \.(?:jpg|jpeg|gif|png|webp|avif)$ {
    expires 1M;
    add_header Cache-Control "public";
    access_log off;
  }

  # Pas de cache pour index.html
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}